  <body>
    <canvas id="bg-canvas"></canvas>
    <div class="container">
      <div id="tab-add" class="tab-content active">
        <h1>That Inventory Manager</h1>
        <div class="row" id="custom-item-wrap">
          <div>
            <label for="item">Selected Item</label>
            <input type="text" id="item" class="rounded-input" placeholder="Type an item or browse presets" />
            <div id="item-hint" class="field-hint">Click the item field to browse presets, or type your own item name.</div>
          </div>
        </div>
        <div class="row row-preset">
          <div>
            <div id="preset-picker" class="preset-picker rounded-input">
              <div class="preset-picker-header">
                <div id="preset-trail" class="preset-trail">Nothing selected yet</div>
                <div id="preset-legend" class="preset-legend" aria-hidden="true">
                  <span class="legend-item supported-legend"><span class="legend-dot supported"></span>Supported</span>
                  <span class="legend-item experimental-legend"><span class="legend-dot experimental"></span>Experimental</span>
                </div>
              </div>
              <div class="preset-tree-shell">
                <svg id="preset-lines" class="preset-lines" aria-hidden="true"></svg>
                <div id="preset-tree" class="preset-tree" aria-label="Preset tree selector"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="row">
          <div>
            <label for="box_letter">Box ID</label>
            <div class="box-id-row">
              <select id="box_letter"></select>
              <select id="box_number"></select>
            </div>
          </div>
          <div>
            <label for="shelf">Shelf Life</label>
            <div class="ctrl-wrap" data-wheel-adjust="shelf">
              <input type="number" id="shelf" value="7" class="centered-input" />
              <button class="ctrl-btn" type="button" data-adjust-target="shelf" data-adjust-delta="-1"><span>-</span></button>
              <button class="ctrl-btn" type="button" data-adjust-target="shelf" data-adjust-delta="1"><span>+</span></button>
            </div>
          </div>
        </div>
        <div class="row">
          <div>
            <label for="qty">Quantity</label>
            <div class="ctrl-wrap" data-wheel-adjust="qty">
              <input type="number" id="qty" value="1" class="centered-input" />
              <button class="ctrl-btn" type="button" data-adjust-target="qty" data-adjust-delta="-1"><span>-</span></button>
              <button class="ctrl-btn" type="button" data-adjust-target="qty" data-adjust-delta="1"><span>+</span></button>
            </div>
          </div>
          <div>
            <label for="expiry">Expiry Date</label>
            <input type="date" id="expiry" class="rounded-input" />
          </div>
        </div>
        <button class="submit" id="submit-add" type="button">LOG NEW ITEM</button>
      </div>

      <div id="tab-list" class="tab-content">
        <div class="inventory-header">
          <h1>Current Inventory</h1>
          <div id="inventory-search-shell" class="inventory-search-shell">
            <button id="inventory-search-toggle" class="inventory-search-toggle" type="button" aria-label="Search inventory" aria-expanded="false">
              <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="4.5"></circle>
                <path d="M14.5 14.5L19 19"></path>
              </svg>
            </button>
            <input id="inventory-search-input" class="inventory-search-input" type="text" placeholder="search!" autocomplete="off" />
            <select id="inventory-search-field" class="inventory-search-field" aria-label="Search by">
              <option value="box">Box ID</option>
              <option value="item" selected>Name</option>
            </select>
          </div>
        </div>

        <div class="inventory-filter-bar" aria-label="Filter by food condition">
          <button class="condition-chip active" type="button" data-condition-filter="all">All</button>
          <button class="condition-chip" type="button" data-condition-filter="0">Fresh</button>
          <button class="condition-chip" type="button" data-condition-filter="1">Going Bad</button>
          <button class="condition-chip" type="button" data-condition-filter="2">Expired</button>
          <button class="condition-chip" type="button" data-condition-filter="3">Unknown</button>
        </div>

        <div class="inventory-scroll">
          <table>
            <thead>
              <tr>
                <th>Box</th>
                <th>Item</th>
                <th>Registered</th>
                <th>Expiry</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="recommendation-modal" class="modal-backdrop" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="recommendation-title">
        <div id="recommendation-title" class="modal-title">Suggested physical slot</div>
        <p id="recommendation-text" class="modal-copy"></p>
        <div class="modal-actions">
          <button id="recommendation-accept" class="modal-btn modal-btn-accept" type="button">✓ Move there</button>
          <button id="recommendation-decline" class="modal-btn modal-btn-decline" type="button">✕ Keep current box</button>
        </div>
      </div>
    </div>

    <div class="nav-bar">
      <button class="nav-item active" type="button" data-tab="add">[ LOG ITEM ]</button>
      <button class="nav-item" type="button" data-tab="list">[ INVENTORY ]</button>
    </div>
