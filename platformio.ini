; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:uno]
platform = atmelavr
board = uno
framework = arduino
build_src_filter = ++<./arduino/*.c> <./arduino/*.cpp> +<./.common/*.h>
lib_deps = 
  adafruit/Adafruit SSD1306@^2.5.16
	featherfly/SoftwareSerial@^1.0.0
extra_scripts = 
  pre:src/python/py_uno.py

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
build_src_filter = +<./nodemcu/*.c> +<./nodemcu/*.cpp> +<./.common/*.h> -<./nodemcu/svelte>
lib_deps = 
	esphome/ESPAsyncWebServer-esphome
	esphome/ESPAsyncTCP-esphome
extra_scripts = 
  pre:src/python/py_nodemcu.py
